<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3a1a">
<title>SimGolf Mobile</title>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
    --ui-primary: #2d5a27;
    --ui-secondary: #4a7c3f;
    --ui-accent: #7bc96f;
    --ui-bg: #1a1a2e;
    --ui-surface: rgba(26, 26, 46, 0.92);
    --ui-text: #e0e0e0;
    --ui-text-dim: #888;
    --ui-gold: #ffd700;
    --toolbar-h: 64px;
    --hud-h: 48px;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--ui-bg);
    color: var(--ui-text);
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
}

/* ============================================================
   GAME SHELL — Layout principal
   ============================================================ */
#game-shell {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: #000;
}

/* Canvas — plein écran en arrière-plan */
#game-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    z-index: 0;
}

/* ============================================================
   HUD — Bandeau supérieur
   ============================================================ */
#hud {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: var(--hud-h);
    padding-top: var(--safe-top);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, var(--ui-surface) 60%, transparent);
    z-index: 10;
    padding-left: 12px;
    padding-right: 12px;
    font-size: 14px;
    pointer-events: none;
}

#hud > * {
    pointer-events: auto;
}

.hud-left  { display: flex; align-items: center; gap: 8px; }
.hud-center { display: flex; align-items: center; gap: 6px; font-weight: 600; }
.hud-right { display: flex; align-items: center; gap: 8px; }

.hud-hole {
    background: var(--ui-primary);
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
}
.hud-par {
    font-size: 12px;
    color: var(--ui-text-dim);
}
.hud-score {
    font-weight: 700;
    font-size: 18px;
}
.hud-money {
    background: rgba(255, 215, 0, 0.15);
    color: var(--ui-gold);
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 13px;
}
.hud-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--ui-text);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
}
.hud-btn:active {
    background: rgba(255,255,255,0.25);
}

/* ============================================================
   BUILD TOOLBAR — Barre d'outils en bas
   ============================================================ */
#build-toolbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding-bottom: var(--safe-bottom);
    z-index: 10;
    pointer-events: none;
}

.toolbar-content {
    background: var(--ui-surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 8px 8px 4px;
    pointer-events: auto;
}

/* Rangée d'outils (scroll horizontal) */
.tool-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 0 4px;
}
.tool-scroll::-webkit-scrollbar { display: none; }

.tool-btn {
    flex: 0 0 52px;
    height: 52px;
    border-radius: 12px;
    border: 2px solid transparent;
    background: rgba(255,255,255,0.06);
    color: var(--ui-text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 9px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-touch-callout: none;
}
.tool-btn .tool-icon {
    font-size: 22px;
    line-height: 1;
}
.tool-btn:active {
    transform: scale(0.92);
}
.tool-btn.active {
    background: var(--ui-primary);
    border-color: var(--ui-accent);
    color: var(--ui-accent);
}

/* Palette de couleurs / sous-options */
.tool-palette {
    display: flex;
    gap: 4px;
    padding: 6px 8px;
    overflow-x: auto;
    scrollbar-width: none;
}
.tool-palette::-webkit-scrollbar { display: none; }

.palette-btn {
    flex: 0 0 36px;
    height: 36px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
}
.palette-btn.active {
    border-color: white;
    transform: scale(1.1);
}

/* ============================================================
   MAIN MENU
   ============================================================ */
#main-menu {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0a1a0a 0%, #1a3a1a 50%, #0d260d 100%);
    padding: 40px 24px;
}

.menu-title {
    font-size: clamp(28px, 8vw, 52px);
    font-weight: 800;
    color: white;
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    letter-spacing: -1px;
}
.menu-subtitle {
    font-size: clamp(12px, 3vw, 18px);
    color: var(--ui-accent);
    margin-bottom: 48px;
    text-align: center;
}

.menu-btn {
    width: min(320px, 80vw);
    padding: 16px 24px;
    border-radius: 16px;
    border: none;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
}
.menu-btn:active {
    transform: scale(0.95);
}
.menu-btn.primary {
    background: var(--ui-accent);
    color: #0a1a0a;
    box-shadow: 0 4px 20px rgba(123, 201, 111, 0.3);
}
.menu-btn.secondary {
    background: rgba(255,255,255,0.1);
    color: var(--ui-text);
    border: 1px solid rgba(255,255,255,0.15);
}
.menu-btn .menu-icon {
    font-size: 20px;
}

.menu-themes {
    display: flex;
    gap: 8px;
    margin-top: 24px;
    flex-wrap: wrap;
    justify-content: center;
}
.theme-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: var(--ui-text-dim);
    font-size: 12px;
    cursor: pointer;
}
.theme-chip.active {
    background: var(--ui-primary);
    border-color: var(--ui-accent);
    color: var(--ui-accent);
}

/* ============================================================
   PANELS (glissants depuis le bas)
   ============================================================ */
.panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 50;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}
.panel-overlay.open {
    opacity: 1;
    pointer-events: auto;
}

.panel-sheet {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 51;
    background: var(--ui-surface);
    backdrop-filter: blur(16px);
    border-radius: 20px 20px 0 0;
    padding: 16px 20px calc(16px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 75vh;
    overflow-y: auto;
}
.panel-sheet.open {
    transform: translateY(0);
}

.panel-handle {
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.2);
    margin: 0 auto 12px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (min-width: 768px) {
    /* Tablets: toolbar plus compact, à droite */
    #build-toolbar {
        left: auto;
        right: 12px;
        top: calc(var(--hud-h) + var(--safe-top) + 8px);
        bottom: auto;
        width: 64px;
    }
    .toolbar-content {
        background: var(--ui-surface);
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.08);
        padding: 8px;
    }
    .tool-scroll {
        flex-direction: column;
        overflow-x: hidden;
        overflow-y: auto;
    }
    .tool-btn {
        flex: 0 0 48px;
        width: 48px;
        height: 48px;
    }
    .hud-hole { font-size: 15px; }
}

@media (min-width: 1024px) {
    /* Desktop: toolbar en colonne fixe */
    #build-toolbar {
        left: 12px;
        right: auto;
        top: calc(var(--hud-h) + var(--safe-top) + 8px);
        width: 56px;
    }
}
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="main-menu">
    <div class="menu-title">SimGolf</div>
    <div class="menu-subtitle">Course Tycoon &bull; Mobile Edition</div>
    
    <button class="menu-btn primary" id="btn-new-game">
        <span class="menu-icon">⛳</span> Nouvelle Partie
    </button>
    <button class="menu-btn secondary" id="btn-load-game">
        <span class="menu-icon">📂</span> Continuer
    </button>
    <button class="menu-btn secondary" id="btn-tutorial">
        <span class="menu-icon">📖</span> Tutoriel
    </button>
    
    <div class="menu-themes">
        <span class="theme-chip active" data-theme="Parkland">🌳 Parkland</span>
        <span class="theme-chip" data-theme="Desert">🏜️ Desert</span>
        <span class="theme-chip" data-theme="Links">🌊 Links</span>
        <span class="theme-chip" data-theme="Tropical">🌴 Tropical</span>
    </div>
</div>

<!-- GAME SHELL -->
<div id="game-shell" style="display:none;">
    <canvas id="game-canvas"></canvas>
    
    <!-- HUD -->
    <div id="hud">
        <div class="hud-left">
            <button class="hud-btn" id="btn-menu">☰</button>
            <span class="hud-hole" id="hud-hole">Trou 1</span>
            <span class="hud-par" id="hud-par">Par 4</span>
        </div>
        <div class="hud-center">
            <span class="hud-score" id="hud-score">E</span>
        </div>
        <div class="hud-right">
            <span class="hud-money" id="hud-money">💰 $0</span>
        </div>
    </div>
    
    <!-- BUILD TOOLBAR -->
    <div id="build-toolbar">
        <div class="toolbar-content">
            <div class="tool-scroll" id="tool-scroll">
                <!-- Rempli dynamiquement par BuildToolbar -->
            </div>
            <div class="tool-palette" id="tool-palette" style="display:none;">
                <!-- Sous-options de l'outil sélectionné -->
            </div>
        </div>
    </div>
</div>

<!-- PANEL OVERLAY + SHEET -->
<div class="panel-overlay" id="panel-overlay"></div>
<div class="panel-sheet" id="panel-sheet">
    <div class="panel-handle"></div>
    <div id="panel-content"></div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
